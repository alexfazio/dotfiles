# Kitty Configuration
# vim:fileencoding=utf-8:foldmethod=marker

# ============================================
# FONT
# ============================================
font_family      family="Berkeley Mono"
bold_font        family="Berkeley Mono" style=Bold
italic_font      family="Berkeley Mono" style=Italic
bold_italic_font family="Berkeley Mono" style="Bold Italic"
font_size        17.0

# ============================================
# THEME
# ============================================
# Uncomment to use Catppuccin Mocha theme:
# include themes/Catppuccin-Mocha.conf

# ============================================
# INCLUDE SPLITS & KEYBINDINGS
# ============================================
include splits.conf

# ============================================
# AWRIT BROWSER KEYBINDING
# ============================================
# Launch awrit graphical web browser in new window
map ctrl+shift+w launch --stdin-source=@none --type=tab awrit
